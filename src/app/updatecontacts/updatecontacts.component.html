<div class="container">
    <div class="toolbar">
        <h2>{{ userName }}'s Contact List</h2>
        <button (click)="authService.logout()" class="btn btn-sm btn-danger">Logout</button>
    </div>
    <form #f="ngForm" (ngSubmit)="updateContact(f)">
        
        <div class="form-group">
            <label>First Name</label>
            <input type="text" name="firstName" class="form-control" [(ngModel)]="contact.firstName" required max-length="50" />
            <div *ngIf="f.controls['firstName']?.errors?.['maxlength'] && f.controls['firstName']?.touched" class="alert alert-danger">
                First Name cannot exceed 50 characters.
            </div>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input type="text" name="lastName" class="form-control" [(ngModel)]="contact.lastName" required max-length="50" />
            <div *ngIf="f.controls['lastName']?.errors?.['maxlength'] && f.controls['lastName']?.touched" class="alert alert-danger">
                Last Name cannot exceed 50 characters.
            </div>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="text" name="emailAddress" class="form-control" [(ngModel)]="contact.emailAddress" required max-length="100" />
            <div *ngIf="f.controls['emailAddress']?.errors?.['maxlength'] && f.controls['emailAddress']?.touched" class="alert alert-danger">
                Email Address cannot exceed 100 characters.
            </div>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" name="phoneNumber" class="form-control" [(ngModel)]="contact.phoneNumber" required max-length="15" />
            <div *ngIf="f.controls['phoneNumber']?.errors?.['maxlength'] && f.controls['phoneNumber']?.touched" class="alert alert-danger">
                Phone Number cannot exceed 15 characters.
            </div>
        </div>

        <div class="form-group">
            <label>Status</label>
            <select name="status" class="form-control" [(ngModel)]="contact.status" required>
                <option value="member">Member</option>
                <option value="nonmember">NonMember</option>
            </select>            
        </div>

        <div class="form-group">
            <label>Date of Birth</label>
            <input type="date" name="dob" class="form-control" [(ngModel)]="contact.dob"
                [max]="maxDate" required />            
        </div>

        <button type="submit" class="btn btn-primary" [disabled]="f.invalid">Update</button>
        <button class="btn btn-secondary" routerLink="/contacts">Cancel</button>

    </form>

</div>
